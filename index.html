<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot - Gemini API</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f3f4f6;
            --chat-bg: #ffffff;
            --text-main: #1f2937;
            --text-light: #6b7280;
            --bot-bubble: #e5e7eb;
            --user-bubble: #2563eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Solid Chat Container (No Glass Effect) */
        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 85vh;
            background-color: var(--chat-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #e5e7eb;
        }

        /* Header with SVG Icon */
        .chat-header {
            background-color: var(--primary-color);
            color: white;
            padding: 16px;
            text-align: center;
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background-color: var(--chat-bg);
        }

        /* Message Animations */
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 0.95rem;
            animation: slideInUp 0.3s ease-out forwards;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background-color: var(--user-bubble);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            align-self: flex-start;
            background-color: var(--bot-bubble);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
            display: flex;
            gap: 10px;
        }

        .bot-icon {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
            fill: var(--primary-color);
        }

        .loading {
            align-self: flex-start;
            color: var(--text-light);
            font-size: 0.9rem;
            animation: pulse 1.5s infinite ease-in-out;
            display: none;
            padding: 10px 20px;
        }

        /* Input Area */
        .input-area {
            display: flex;
            padding: 16px;
            background-color: var(--chat-bg);
            border-top: 1px solid #e5e7eb;
            gap: 12px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 24px;
            outline: none;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .input-area input:focus {
            border-color: var(--primary-color);
        }

        .input-area button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s, background-color 0.2s;
        }

        .input-area button:hover {
            background-color: #1d4ed8;
            transform: scale(1.05);
        }

        .input-area button:active {
            transform: scale(0.95);
        }

        .input-area button svg {
            width: 20px;
            height: 20px;
            fill: white;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="white">
                <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a5 5 0 0 1 5 5v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7a5 5 0 0 1 5-5h1V5.73A2 2 0 1 1 12 2zm3 10a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm-6 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"></path>
            </svg>
            AI Assistant
        </div>

        <div class="chat-box" id="chat-box">
            <div class="message bot">
                <svg class="bot-icon" viewBox="0 0 24 24">
                    <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a5 5 0 0 1 5 5v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7a5 5 0 0 1 5-5h1V5.73A2 2 0 1 1 12 2z"></path>
                </svg>
                <span>Hello! Main aapki kya madad kar sakta hoon?</span>
            </div>
        </div>
        
        <div class="loading" id="loading-indicator">AI is typing...</div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your message here..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()" title="Send">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
            </button>
        </div>
    </div>

    <script>
        // ======= APNI API KEY YAHAN DALEN =======
        const API_KEY = 'AQ.Ab8RN6Ie_Fp4PiFCECVBMGULDxaEWhEbo-bT209_Vkhl8zvO2Q'; 
        // ==========================================

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const loadingIndicator = document.getElementById('loading-indicator');

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Add user message to UI
            appendMessage(text, 'user');
            userInput.value = '';
            
            // Show loading
            loadingIndicator.style.display = 'block';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // Call Google Gemini API
                const botReply = await fetchGeminiResponse(text);
                
                // Hide loading & show bot message
                loadingIndicator.style.display = 'none';
                appendMessage(botReply, 'bot');
            } catch (error) {
                loadingIndicator.style.display = 'none';
                appendMessage("Sorry, network error ya API limit poori ho gayi hai. Kripya check karein.", 'bot');
                console.error("API Error:", error);
            }
        }

        function appendMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', sender);
            
            if(sender === 'bot') {
                // Add Bot Icon for bot messages
                messageDiv.innerHTML = `
                    <svg class="bot-icon" viewBox="0 0 24 24">
                        <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a5 5 0 0 1 5 5v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7a5 5 0 0 1 5-5h1V5.73A2 2 0 1 1 12 2z"></path>
                    </svg>
                    <span></span>
                `;
                // Securely add text to span
                messageDiv.querySelector('span').textContent = text;
            } else {
                messageDiv.textContent = text;
            }

            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function fetchGeminiResponse(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
            
            const requestBody = {
                contents: [{
                    parts: [{ text: prompt }]
                }]
            };

            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(requestBody)
            });

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            const data = await response.json();
            
            // Extract text from Gemini API response structure
            if (data && data.candidates && data.candidates.length > 0) {
                return data.candidates[0].content.parts[0].text;
            } else {
                return "I couldn't process that. Please try again.";
            }
        }
    </script>
</body>
</html>
