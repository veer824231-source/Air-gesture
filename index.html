<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Canvas Ultra - Performance Edition</title>
    
    <!-- MediaPipe & Google Fonts -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0a0a0c;
            --panel-bg: rgba(20, 20, 25, 0.85);
            --panel-border: rgba(255, 255, 255, 0.08);
            --accent-color: #00f2fe;
            --text-color: #f3f4f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* Main Performance Painting Layer */
        #paintCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            cursor: crosshair;
        }

        /* Overlay Canvas for UI pointers (Laser sight, crosshairs) */
        #uiCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        #videoPreviewContainer {
            position: absolute;
            bottom: 24px;
            right: 24px;
            width: 200px;
            height: 150px;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid var(--panel-border);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            z-index: 10;
            transform: scaleX(-1);
            background: #000;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        #videoPreviewContainer.hidden {
            opacity: 0;
            transform: scaleX(-1) scale(0.8);
            pointer-events: none;
        }

        #videoPreviewContainer canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Control Panel UI */
        .control-panel {
            position: absolute;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            backdrop-filter: blur(20px);
            padding: 10px 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
            max-width: 95vw;
            overflow-x: auto;
        }

        .panel-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #8a8a93;
        }

        .color-picker-wrapper {
            position: relative;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.2s ease;
        }

        .color-picker-wrapper:hover {
            transform: scale(1.1);
        }

        #colorPicker {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 80px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--text-color);
            cursor: pointer;
        }

        /* HUD State Indicator Overlay */
        #statusIndicator {
            position: absolute;
            top: 28px;
            left: 32px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            backdrop-filter: blur(20px);
            padding: 10px 16px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
        }

        .status-svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Action Buttons styling */
        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            padding: 8px 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn.active-mode {
            background: rgba(0, 242, 254, 0.15);
            border-color: rgba(0, 242, 254, 0.3);
            color: var(--accent-color);
        }

        .btn.eraser-active {
            background: rgba(255, 69, 58, 0.2) !important;
            border-color: rgba(255, 69, 58, 0.4) !important;
            color: #ff453a !important;
        }

        .clear-btn {
            background: rgba(255, 59, 48, 0.15);
            border: 1px solid rgba(255, 59, 48, 0.3);
            color: #ff453a;
        }

        .clear-btn:hover {
            background: rgba(255, 59, 48, 0.25);
        }

        .btn svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            stroke-width: 2.5;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* COMPACT & SMALL Control Instructions Panel */
        #guidePanel {
            position: absolute;
            bottom: 24px;
            left: 24px;
            z-index: 10;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            backdrop-filter: blur(20px);
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 11px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-width: 220px;
        }

        .guide-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #a1a1aa;
        }

        .guide-item svg {
            width: 14px;
            height: 14px;
            stroke: var(--accent-color);
            stroke-width: 2;
            flex-shrink: 0;
        }

        #loader {
            position: absolute;
            inset: 0;
            background: var(--bg-color);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="font-size: 14px; letter-spacing: 0.05em; color: #8a8a93;">INITIALIZING ULTRA TRACKER...</p>
    </div>

    <div id="statusIndicator">
        <svg class="status-svg" id="statusIcon" viewBox="0 0 24 24"></svg>
        <span id="statusText">Detecting...</span>
    </div>

    <div class="control-panel">
        <!-- Input Mode Selector Toggle Button -->
        <button class="btn active-mode" id="toggleModeBtn">
            <svg id="inputModeIcon" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            <span id="toggleModeText">Camera Tracking</span>
        </button>

        <div style="width: 1px; height: 24px; background: var(--panel-border);"></div>

        <!-- Glow Mode Overclock Switch -->
        <button class="btn" id="glowToggleBtn">
            <svg viewBox="0 0 24 24"><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
            <span>Glow Normal</span>
        </button>

        <!-- Random Neon Palette Shifter -->
        <button class="btn" id="randomColorBtn">
            <svg viewBox="0 0 24 24"><path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 14.7255 3.09032 17.1962 4.85857 19C5.03453 19.176 5.06155 19.4523 4.95079 19.674C4.46083 20.655 4.84307 22 6 22H12Z"/></svg>
            <span>Random Neon</span>
        </button>

        <!-- NEW FEATURE: Background Texture Toggle Shifter -->
        <button class="btn" id="bgToggleBtn">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></button>

        <div class="panel-section" id="colorSection">
            <div class="color-picker-wrapper" id="colorWrapper" style="background-color: #00f2fe;">
                <input type="color" id="colorPicker" value="#00f2fe">
            </div>
        </div>

        <!-- Screen Mode Eraser Toggle Button -->
        <button class="btn" id="screenEraserBtn" style="display: none;">
            <svg viewBox="0 0 24 24"><path d="M20 20H7L3 16c-1-1-1-3 0-4l9-9c1-1 3-1 4 0l4 4c1 1 1 3 0 4L13 20M17 11l-4-4"/></svg>
            <span>Screen Eraser</span>
        </button>

        <div class="panel-section">
            <span class="panel-label">Width</span>
            <div class="slider-container">
                <input type="range" id="brushThickness" min="4" max="50" value="14">
            </div>
        </div>

        <div style="width: 1px; height: 24px; background: var(--panel-border);"></div>

        <!-- High-Res Export Image Button -->
        <button class="btn" id="exportBtn">
            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            <span>Save Sketch</span>
        </button>

        <button class="btn clear-btn" id="clearBtn">
            <svg viewBox="0 0 24 24" fill="none"><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6"/></svg>
            Clear Canvas
        </button>
    </div>

    <canvas id="paintCanvas"></canvas>
    <canvas id="uiCanvas"></canvas>
    
    <div id="videoPreviewContainer">
        <video id="webcam" autoplay playsinline style="display:none;"></video>
        <canvas id="debugCanvas"></canvas>
    </div>

    <div id="guidePanel">
        <div id="cameraInstructions">
            <div class="guide-item">
                <svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
                <span><strong>1 Finger Up:</strong> Neon Draw</span>
            </div>
            <div class="guide-item">
                <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
                <span><strong>Open Palm:</strong> Laser Erase</span>
            </div>
            <div class="guide-item">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M10 15V9l5 3-5 3z"/></svg>
                <span><strong>Closed Fist:</strong> Pause Mode</span>
            </div>
        </div>
        <div id="screenInstructions" style="display: none;">
            <div class="guide-item">
                <svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
                <span><strong>Touch/Click:</strong> Paint Canvas</span>
            </div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const debugCanvas = document.getElementById('debugCanvas');
        const debugCtx = debugCanvas.getContext('2d');
        const paintCanvas = document.getElementById('paintCanvas');
        const paintCtx = paintCanvas.getContext('2d');
        const uiCanvas = document.getElementById('uiCanvas');
        const uiCtx = uiCanvas.getContext('2d');
        
        // UI Controls
        const colorPicker = document.getElementById('colorPicker');
        const colorWrapper = document.getElementById('colorWrapper');
        const brushThickness = document.getElementById('brushThickness');
        const clearBtn = document.getElementById('clearBtn');
        const statusText = document.getElementById('statusText');
        const statusIcon = document.getElementById('statusIcon');
        const loader = document.getElementById('loader');
        
        // Buttons
        const toggleModeBtn = document.getElementById('toggleModeBtn');
        const toggleModeText = document.getElementById('toggleModeText');
        const inputModeIcon = document.getElementById('inputModeIcon');
        const videoPreviewContainer = document.getElementById('videoPreviewContainer');
        const cameraInstructions = document.getElementById('cameraInstructions');
        const screenInstructions = document.getElementById('screenInstructions');
        const glowToggleBtn = document.getElementById('glowToggleBtn');
        const randomColorBtn = document.getElementById('randomColorBtn');
        const exportBtn = document.getElementById('exportBtn');
        const screenEraserBtn = document.getElementById('screenEraserBtn');
        const bgToggleBtn = document.getElementById('bgToggleBtn');

        const svgPaths = {
            draw: `<path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>`,
            erase: `<path d="M20 20H7L3 16c-1-1-1-3 0-4l9-9c1-1 3-1 4 0l4 4c1 1 1 3 0 4L13 20M17 11l-4-4"/>`,
            pause: `<rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>`,
            detecting: `<circle cx="12" cy="12" r="10"></circle><path d="M12 6v6l4 2"></path>`,
            cameraIcon: `<path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/>`,
            screenIcon: `<rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line>`
        };

        let currentColor = colorPicker.value;
        let currentThickness = brushThickness.value;
        let lastX = null;
        let lastY = null;
        let currentMode = 'detecting';
        let inputMode = 'camera'; 
        let isDirectDrawing = false;
        let glowMultiplier = 1.4; 
        let isScreenEraserActive = false;

        // Background matrices variables
        let bgStyleIndex = 0;
        const bgStyles = [
            'radial-gradient(circle at center, #14141a 0%, #0a0a0c 100%)',
            '#050507',
            'radial-gradient(circle at double, #1e112a 0%, #08030e 100%)',
            '#000000'
        ];

        const neonPalettes = ['#00f2fe', '#4facfe', '#00ff66', '#ff007f', '#ff00f0', '#9b51e0', '#ffea00', '#ff5722'];

        function applyBackground() {
            paintCanvas.style.background = bgStyles[bgStyleIndex];
        }
        applyBackground();

        window.addEventListener('resize', resizeCanvas);
        function resizeCanvas() {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = paintCanvas.width;
            tempCanvas.height = paintCanvas.height;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(paintCanvas, 0, 0);

            paintCanvas.width = window.innerWidth;
            paintCanvas.height = window.innerHeight;
            uiCanvas.width = window.innerWidth;
            uiCanvas.height = window.innerHeight;
            
            paintCtx.lineCap = 'round';
            paintCtx.lineJoin = 'round';
            paintCtx.drawImage(tempCanvas, 0, 0);
        }
        resizeCanvas();

        colorPicker.addEventListener('input', (e) => {
            currentColor = e.target.value;
            colorWrapper.style.backgroundColor = currentColor;
            if (isScreenEraserActive) {
                screenEraserBtn.click();
            }
        });

        brushThickness.addEventListener('input', (e) => {
            currentThickness = e.target.value;
        });

        clearBtn.addEventListener('click', wipeCanvas);

        function wipeCanvas() {
            paintCtx.clearRect(0, 0, paintCanvas.width, paintCanvas.height);
        }

        glowToggleBtn.addEventListener('click', () => {
            if (glowMultiplier === 1.4) {
                glowMultiplier = 3.5;
                glowToggleBtn.classList.add('active-mode');
                glowToggleBtn.querySelector('span').innerText = "Glow Boosted";
            } else {
                glowMultiplier = 1.4;
                glowToggleBtn.classList.remove('active-mode');
                glowToggleBtn.querySelector('span').innerText = "Glow Normal";
            }
        });

        randomColorBtn.addEventListener('click', () => {
            const randomColor = neonPalettes[Math.floor(Math.random() * neonPalettes.length)];
            currentColor = randomColor;
            colorPicker.value = randomColor;
            colorWrapper.style.backgroundColor = randomColor;
            if (isScreenEraserActive) {
                screenEraserBtn.click();
            }
        });

        // Background Color Cycle Engine Assignment
        bgToggleBtn.addEventListener('click', () => {
            bgStyleIndex = (bgStyleIndex + 1) % bgStyles.length;
            applyBackground();
        });

        exportBtn.addEventListener('click', () => {
            const exportCanvas = document.createElement('canvas');
            exportCanvas.width = paintCanvas.width;
            exportCanvas.height = paintCanvas.height;
            const exportCtx = exportCanvas.getContext('2d');

            if (bgStyleIndex === 0) {
                const grad = exportCtx.createRadialGradient(exportCanvas.width/2, exportCanvas.height/2, 0, exportCanvas.width/2, exportCanvas.height/2, exportCanvas.width);
                grad.addColorStop(0, '#14141a');
                grad.addColorStop(1, '#0a0a0c');
                exportCtx.fillStyle = grad;
            } else if (bgStyleIndex === 2) {
                const grad = exportCtx.createRadialGradient(exportCanvas.width/2, exportCanvas.height/2, 0, exportCanvas.width/2, exportCanvas.height/2, exportCanvas.width);
                grad.addColorStop(0, '#1e112a');
                grad.addColorStop(1, '#08030e');
                exportCtx.fillStyle = grad;
            } else {
                exportCtx.fillStyle = bgStyles[bgStyleIndex];
            }
            exportCtx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);
            exportCtx.drawImage(paintCanvas, 0, 0);

            const downloadLink = document.createElement('a');
            downloadLink.download = `air-canvas-${Date.now()}.png`;
            downloadLink.href = exportCanvas.toDataURL('image/png');
            downloadLink.click();
        });

        screenEraserBtn.addEventListener('click', () => {
            isScreenEraserActive = !isScreenEraserActive;
            if (isScreenEraserActive) {
                screenEraserBtn.classList.add('eraser-active');
                updateStatusUI('erasing');
            } else {
                screenEraserBtn.classList.remove('eraser-active');
                updateStatusUI('screen_idle');
            }
        });

        toggleModeBtn.addEventListener('click', () => {
            if (inputMode === 'camera') {
                inputMode = 'screen';
                toggleModeText.innerText = "Direct Screen";
                inputModeIcon.innerHTML = svgPaths.screenIcon;
                videoPreviewContainer.classList.add('hidden');
                cameraInstructions.style.display = 'none';
                screenInstructions.style.display = 'flex';
                screenEraserBtn.style.display = 'flex';
                updateStatusUI('screen_idle');
            } else {
                inputMode = 'camera';
                toggleModeText.innerText = "Camera Tracking";
                inputModeIcon.innerHTML = svgPaths.cameraIcon;
                videoPreviewContainer.classList.remove('hidden');
                cameraInstructions.style.display = 'flex';
                screenInstructions.style.display = 'none';
                screenEraserBtn.style.display = 'none';
                if (isScreenEraserActive) {
                    screenEraserBtn.classList.remove('eraser-active');
                    isScreenEraserActive = false;
                }
                updateStatusUI('detecting');
            }
            lastX = null;
            lastY = null;
            uiCtx.clearRect(0, 0, uiCanvas.width, uiCanvas.height);
        });

        function updateStatusUI(mode) {
            if (currentMode === mode && inputMode === 'camera') return;
            currentMode = mode;
            
            switch(mode) {
                case 'drawing':
                    statusText.innerText = "Drawing Mode";
                    statusIcon.innerHTML = svgPaths.draw;
                    statusIcon.style.stroke = currentColor;
                    break;
                case 'erasing':
                    statusText.innerText = "Laser Erase";
                    statusIcon.innerHTML = svgPaths.erase;
                    statusIcon.style.stroke = "#ff453a";
                    break;
                case 'paused':
                    statusText.innerText = "Paused";
                    statusIcon.innerHTML = svgPaths.pause;
                    statusIcon.style.stroke = "#ffcc00";
                    break;
                case 'screen_idle':
                    statusText.innerText = "Screen Mode Ready";
                    statusIcon.innerHTML = svgPaths.screenIcon;
                    statusIcon.style.stroke = "#00f2fe";
                    break;
                default:
                    statusText.innerText = "Finding Hand...";
                    statusIcon.innerHTML = svgPaths.detecting;
                    statusIcon.style.stroke = "#8a8a93";
            }
        }
        updateStatusUI('detecting');

        // Highly-Acurate 3-State Logic Tracking Map (L-Shape Removed)
        function analyzeGesture(landmarks) {
            const indexExtended = landmarks[8].y < landmarks[6].y;
            const middleExtended = landmarks[12].y < landmarks[10].y;
            const ringExtended = landmarks[16].y < landmarks[14].y;
            const pinkyExtended = landmarks[20].y < landmarks[18].y;

            if (indexExtended && middleExtended && ringExtended && pinkyExtended) {
                return 'erasing';
            }
            if (!indexExtended && !middleExtended && !ringExtended && !pinkyExtended) {
                return 'paused';
            }
            if (indexExtended && !middleExtended && !ringExtended && !pinkyExtended) {
                return 'drawing';
            }

            return 'paused';
        }

        function drawTargetHUD(x, y, radius) {
            uiCtx.clearRect(0, 0, uiCanvas.width, uiCanvas.height);
            uiCtx.save();
            uiCtx.strokeStyle = 'rgba(255, 69, 58, 0.85)';
            uiCtx.lineWidth = 2;
            
            uiCtx.beginPath();
            uiCtx.arc(x, y, radius, 0, 2 * Math.PI);
            uiCtx.stroke();
            
            uiCtx.beginPath();
            uiCtx.arc(x, y, 3, 0, 2 * Math.PI);
            uiCtx.fillStyle = '#ff453a';
            uiCtx.fill();
            
            uiCtx.strokeStyle = 'rgba(255, 69, 58, 0.4)';
            uiCtx.lineWidth = 1;
            uiCtx.beginPath();
            uiCtx.moveTo(x - radius - 6, y); uiCtx.lineTo(x - radius + 4, y);
            uiCtx.moveTo(x + radius - 4, y); uiCtx.lineTo(x + radius + 6, y);
            uiCtx.moveTo(x, y - radius - 6); uiCtx.lineTo(x, y - radius + 4);
            uiCtx.moveTo(x, y + radius - 4); uiCtx.lineTo(x, y + radius + 6);
            uiCtx.stroke();
            uiCtx.restore();
        }

        function drawNeonLine(x1, y1, x2, y2) {
            paintCtx.save();
            paintCtx.shadowBlur = parseInt(currentThickness) * glowMultiplier;
            paintCtx.shadowColor = currentColor;
            paintCtx.strokeStyle = currentColor;
            paintCtx.lineWidth = currentThickness;

            paintCtx.beginPath();
            if (x1 !== null && y1 !== null) {
                paintCtx.moveTo(x1, y1);
                paintCtx.lineTo(x2, y2);
            } else {
                paintCtx.moveTo(x2, y2);
            }
            paintCtx.stroke();
            paintCtx.restore();
        }

        // Vector Eraser Pipeline Engine
        function eraseNeonLine(x1, y1, x2, y2, radius) {
            paintCtx.save();
            paintCtx.globalCompositeOperation = 'destination-out';
            paintCtx.strokeStyle = 'rgba(0,0,0,1)';
            paintCtx.lineWidth = radius * 2;
            paintCtx.lineCap = 'round';
            paintCtx.lineJoin = 'round';

            paintCtx.beginPath();
            if (x1 !== null && y1 !== null) {
                paintCtx.moveTo(x1, y1);
                paintCtx.lineTo(x2, y2);
            } else {
                paintCtx.moveTo(x2, y2);
            }
            paintCtx.stroke();
            paintCtx.restore();
        }

        function getCoords(e) {
            const rect = paintCanvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function startDirectDraw(e) {
            if (inputMode !== 'screen') return;
            isDirectDrawing = true;
            const coords = getCoords(e);
            
            if (isScreenEraserActive) {
                updateStatusUI('erasing');
                eraseNeonLine(null, null, coords.x, coords.y, parseInt(currentThickness) * 1.5);
            } else {
                updateStatusUI('drawing');
                drawNeonLine(null, null, coords.x, coords.y);
            }
            lastX = coords.x;
            lastY = coords.y;
        }

        function moveDirectDraw(e) {
            if (inputMode !== 'screen' || !isDirectDrawing) return;
            const coords = getCoords(e);
            
            if (isScreenEraserActive) {
                eraseNeonLine(lastX, lastY, coords.x, coords.y, parseInt(currentThickness) * 1.5);
            } else {
                drawNeonLine(lastX, lastY, coords.x, coords.y);
            }
            lastX = coords.x;
            lastY = coords.y;
        }

        function stopDirectDraw() {
            if (inputMode !== 'screen') return;
            isDirectDrawing = false;
            lastX = null;
            lastY = null;
            updateStatusUI(isScreenEraserActive ? 'erasing' : 'screen_idle');
        }

        paintCanvas.addEventListener('mousedown', startDirectDraw);
        paintCanvas.addEventListener('mousemove', moveDirectDraw);
        window.addEventListener('mouseup', stopDirectDraw);

        paintCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDirectDraw(e); }, { passive: false });
        paintCanvas.addEventListener('touchmove', (e) => { e.preventDefault(); moveDirectDraw(e); }, { passive: false });
        paintCanvas.addEventListener('touchend', stopDirectDraw);

        // Frame Processor Loop with Overclocked High-Confidence Gates
        function onResults(results) {
            if (loader.style.opacity !== '0') {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }

            if (inputMode === 'screen') return;

            debugCanvas.width = videoElement.videoWidth;
            debugCanvas.height = videoElement.videoHeight;
            
            debugCtx.save();
            debugCtx.clearRect(0, 0, debugCanvas.width, debugCanvas.height);
            debugCtx.translate(debugCanvas.width, 0);
            debugCtx.scale(-1, 1);
            debugCtx.drawImage(results.image, 0, 0, debugCanvas.width, debugCanvas.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                for (const landmark of landmarks) {
                    debugCtx.beginPath();
                    debugCtx.arc(landmark.x * debugCanvas.width, landmark.y * debugCanvas.height, 3, 0, 2 * Math.PI);
                    debugCtx.fillStyle = currentColor;
                    debugCtx.fill();
                }

                const mode = analyzeGesture(landmarks);
                updateStatusUI(mode);

                const targetX = (1 - landmarks[8].x) * paintCanvas.width;
                const targetY = landmarks[8].y * paintCanvas.height;

                if (mode === 'drawing') {
                    uiCtx.clearRect(0, 0, uiCanvas.width, uiCanvas.height);
                    drawNeonLine(lastX, lastY, targetX, targetY);
                    lastX = targetX;
                    lastY = targetY;
                } else if (mode === 'erasing') {
                    const eraseRadius = parseInt(currentThickness) * 2.5;
                    drawTargetHUD(targetX, targetY, eraseRadius);
                    eraseNeonLine(lastX, lastY, targetX, targetY, eraseRadius);
                    lastX = targetX;
                    lastY = targetY;
                } else {
                    uiCtx.clearRect(0, 0, uiCanvas.width, uiCanvas.height);
                    lastX = null;
                    lastY = null;
                }
            } else {
                updateStatusUI('detecting');
                uiCtx.clearRect(0, 0, uiCanvas.width, uiCanvas.height);
                lastX = null;
                lastY = null;
            }
            
            debugCtx.restore();
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        // Elevated Confidence settings for extreme tracking speed stability 
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.82,
            minTrackingConfidence: 0.82
        });

        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 640,
            height: 480
        });
        
        camera.start().catch(err => {
            loader.style.display = 'none';
            toggleModeBtn.click();
        });
    </script>
</body>
</html>
